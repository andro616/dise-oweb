<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <h1>Ejercicios Practicos html + css + js</h1>

        <div class="ejercicio">
            <h2>Calculadora de IMC</h2>
            <p>Calcular el IMC usando variables y operadores. Formula: IMC = peso / (altura) <sup>2</sup></p>

            <div class="input-group">
                <label for="pesoImc">Peso (KG)</label>
                <input type="number" name="pesoImc" id="pesoImc" placeholder="Ingrese su peso en kg" min="5" max="200" step="10" required>
            </div>

            <div class="input-group">
                <label for="alturaImc">Altura (M)</label>
                <input type="number" name="alturaImc" id="alturaImc" placeholder="Ingrese su altura en metros" min="1" max="2.30" step="0.1" required>
            </div>

            <button type="submit">Calcular IMC</button>

            <div id="resultadoIMC" class="resultado">
                <h3>Tu IMC es: </h3>
                <p id="valorImc"></p>
                <p id="categoriaImc"></p>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
